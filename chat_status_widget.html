<!-- Static-only chat status indicator for GitHub Pages.
     Replaces the full chat widget when hosted statically.
     Pings chat.tmnmv.com on load; shows a colored dot + label.
     No fetch to relative /chat (which would 404 on Pages). -->
<style>
  #tmnmv-chat-status {
    position: fixed !important;
    inset: auto calc(24px + env(safe-area-inset-right, 0px)) calc(24px + env(safe-area-inset-bottom, 0px)) auto !important;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    z-index: 9999 !important;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #tmnmv-chat-status:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  #tmnmv-chat-status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #a3a3a3;
    flex-shrink: 0;
    transition: background 0.3s ease;
  }
  #tmnmv-chat-status.available .dot {
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
  }
  #tmnmv-chat-status.unavailable .dot {
    background: #ef4444;
  }
  #tmnmv-chat-status .label { white-space: nowrap; }
  @media (max-width: 480px) {
    #tmnmv-chat-status { font-size: 12px; padding: 8px 12px; }
  }
</style>
<a id="tmnmv-chat-status" href="https://chat.tmnmv.com/" target="_blank" rel="noopener" aria-label="Open chatbot">
  <span class="dot" aria-hidden="true"></span>
  <span class="label">Checking chat…</span>
</a>
<script>
(function () {
  var el = document.getElementById('tmnmv-chat-status');
  if (!el) return;
  var label = el.querySelector('.label');

  // Probe the chatbot endpoint. Use a 3s timeout — fail fast.
  // Sagan hosts chat at chat.tmnmv.com via FastAPI /chat POST. We do a HEAD
  // first to avoid triggering the LLM. If HEAD fails we fall back to a
  // GET on / (FastAPI returns 405 on GET /, but the TCP connect succeeds —
  // meaning Sagan is up even if the route is wrong).
  var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
  var timeoutId = setTimeout(function () {
    if (controller) controller.abort();
    markUnavailable();
  }, 3000);

  function markAvailable() {
    clearTimeout(timeoutId);
    el.classList.add('available');
    el.classList.remove('unavailable');
    label.textContent = 'Chat available';
    el.setAttribute('aria-label', 'Open chatbot (available)');
  }
  function markUnavailable() {
    clearTimeout(timeoutId);
    el.classList.add('unavailable');
    el.classList.remove('available');
    label.textContent = 'Chat offline';
    el.setAttribute('aria-label', 'Open chatbot (offline — Sagan may be down)');
  }

  // Try a HEAD probe first. If that errors (CORS or network), try no-cors mode.
  fetch('https://chat.tmnmv.com/', {
    method: 'HEAD',
    mode: 'no-cors',
    signal: controller ? controller.signal : undefined,
    cache: 'no-store'
  })
  .then(function () { markAvailable(); })
  .catch(function () { markUnavailable(); });
})();
</script>
